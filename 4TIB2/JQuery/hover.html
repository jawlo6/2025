<h1>Hover() - obsługuje dwa zdarzenia: mouseenter i mouseout</h1>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<p id="akapit1">Najedź na mnie aby wyświetlić komunikat</p>
<p>Drugi akapit</p>

<script>
    $( function(){ 
        $("#akapit1").hover( function() {
            alert("Witaj na mojej stronie");
        }, function() {
            alert("Do zobaczenia na mojej stronie");
        } );
    } );
</script>
