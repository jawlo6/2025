<script src="jquery.min.js"></script>
<script>
    $(function($){
        $("#flip").click(function(){
            $("#panel").slideToggle("slow");
        });
    })
</script>

<style>
    #panel, #flip{
        background-color: red;
    }

    #panel{
        padding: 50px;
        display: none;
    }
</style>

<div id="flip">Click to slide down/up panel</div>
<div id="panel">Hello world!</div>
