<h1>hide() - ukrywa element, show() - wyświetla element </h1>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<button id="hide">Ukryj akapit</button>
<button id="show">Pokaż akapit</button>
<p id="akapit1">Pierwszy akapit</p>
<script>
    $( function(){ 
        $("#hide").click( function() {
            $("#akapit1").hide();
        } );
        $("#show").click( function() {
            $("#akapit1").show();
        } );
    } );
</script>
